<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kalyan Universe</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<canvas id="galaxy"></canvas>

<div id="welcomeBox" class="centerBox">

<h1 class="title">Enter Your Name</h1>

<input id="nameInput" placeholder="Type your name">

<br><br>

<button onclick="start()">ENTER</button>

</div>



<div id="homePage" style="display:none;">

<h2 id="welcome"></h2>

<div class="orbitBox">

<img src="home-dp.png" class="dp">

<div class="planet"></div>

</div>

<h1 class="name">Kalyan</h1>

<button id="enterUniverse">ENTER UNIVERSE</button>

</div>



<script src="main.js"></script>
<script src="warp.js"></script>

<script>

function start(){

let name=document.getElementById("nameInput").value

if(name=="") name="Guest"

localStorage.setItem("username",name)

document.getElementById("welcomeBox").style.display="none"

document.getElementById("homePage").style.display="block"

document.getElementById("welcome").innerHTML="Welcome "+name

let voice=new SpeechSynthesisUtterance("Welcome "+name+" to Kalyan Universe")

speechSynthesis.speak(voice)

}

</script>

</body>
</html>
